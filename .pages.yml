######################################################################
# Pages CMS configuration - Mezquita Abdullah (La Habana, Cuba)
# Docs: https://pagescms.org/docs/configuration/
######################################################################

# Where uploaded images/media live
media:
  input: public/uploads
  output: /public/uploads

content:

  # ============================================================
  # 1) EVENTS - Used by index.html (homepage upcoming) and events.html (full list)
  # ============================================================
  - name: events
    label: "📅 Eventos / فعاليات"
    type: collection
    path: data/events
    format: json
    filename: "{year}-{month}-{day}-{primary}.json"
    view:
      fields: [title, date, category, featured]
      primary: title
      sort: [date]
      default:
        sort: date
        order: desc
    fields:
      - name: title
        label: "Título / العنوان / Title"
        type: string
        required: true
      - name: date
        label: "Fecha y hora / التاريخ والوقت"
        type: date
        required: true
        options:
          format: "yyyy-MM-dd HH:mm"
          time: true
      - name: location
        label: "Lugar / المكان"
        type: string
        required: false
        default: "Mezquita Abdullah, Habana Vieja"
      - name: category
        label: "Categoría / الفئة"
        type: select
        required: false
        options:
          values:
            - { value: "religious", label: "🕌 Religioso / ديني" }
            - { value: "educational", label: "📚 Educativo / تعليمي" }
            - { value: "community", label: "🤝 Comunitario / مجتمعي" }
            - { value: "ramadan", label: "🌙 Ramadán / رمضان" }
            - { value: "youth", label: "👶 Jóvenes / شباب" }
            - { value: "women", label: "👩 Mujeres / نساء" }
            - { value: "tahfiz", label: "📖 Memorización / تحفيظ" }
            - { value: "iftar", label: "🍽️ Iftar / إفطار" }
            - { value: "other", label: "✨ Otro / آخر" }
          default: "community"
      - name: description
        label: "Descripción / الوصف"
        type: text
        required: true
        options:
          rows: 6
      - name: description_en
        label: "Description (English) — optional"
        type: text
        required: false
        options: { rows: 4 }
      - name: description_ar
        label: "الوصف بالعربية — اختياري"
        type: text
        required: false
        options: { rows: 4 }
      - name: description_fr
        label: "Description (Français) — optionnel"
        type: text
        required: false
        options: { rows: 4 }
      - name: image
        label: "Imagen (opcional) / صورة"
        type: image
        required: false
      - name: register_url
        label: "Enlace de registro (WhatsApp, formulario, etc.)"
        type: string
        required: false
      - name: featured
        label: "⭐ Destacado / مميّز (estrella dorada en la tarjeta)"
        type: boolean
        required: false
        default: false
      - name: show_on_homepage
        label: "Mostrar en página principal / عرض في الصفحة الرئيسية"
        type: boolean
        required: false
        default: true

  # ============================================================
  # 2) ANNOUNCEMENTS - Quick community announcements (weddings, condolences, classes…)
  # ============================================================
  - name: announcements
    label: "📢 Anuncios / إعلانات"
    type: collection
    path: data/announcements
    format: json
    filename: "{year}-{month}-{day}-{primary}.json"
    view:
      fields: [title, type, date]
      primary: title
      sort: [date]
      default: { sort: date, order: desc }
    fields:
      - name: title
        label: "Título"
        type: string
        required: true
      - name: type
        label: "Tipo"
        type: select
        options:
          values:
            - { value: "wedding", label: "🎉 Boda / زواج" }
            - { value: "funeral", label: "🤲 Funeral / عزاء" }
            - { value: "iftar", label: "🌙 Iftar / إفطار" }
            - { value: "class", label: "📚 Clase / درس" }
            - { value: "general", label: "📣 General / عام" }
      - name: date
        label: "Fecha"
        type: date
      - name: description
        label: "Descripción"
        type: text
        options: { rows: 4 }

  # ============================================================
  # 3) WEEKLY RECURRING - For events page weekly schedule (optional, fixed weekly events)
  # ============================================================
  - name: recurring
    label: "🔁 Eventos recurrentes (semanales)"
    type: collection
    path: data/recurring
    format: json
    filename: "{primary}.json"
    view:
      fields: [title, weekday, time]
      primary: title
    fields:
      - name: title
        label: "Título"
        type: string
        required: true
      - name: weekday
        label: "Día de la semana"
        type: select
        options:
          values:
            - { value: "monday", label: "Lunes" }
            - { value: "tuesday", label: "Martes" }
            - { value: "wednesday", label: "Miércoles" }
            - { value: "thursday", label: "Jueves" }
            - { value: "friday", label: "Viernes" }
            - { value: "saturday", label: "Sábado" }
            - { value: "sunday", label: "Domingo" }
      - name: time
        label: "Hora (HH:MM)"
        type: string
        required: true
      - name: description
        label: "Descripción"
        type: text
        options: { rows: 4 }
      - name: category
        label: "Categoría"
        type: select
        options:
          values:
            - { value: "religious", label: "Religioso" }
            - { value: "educational", label: "Educativo" }
            - { value: "community", label: "Comunitario" }
