<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Gracias! - Mezquita Abdullah</title>
    <link rel="icon" type="image/jpeg" href="images/logo.jpg">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .thanks-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: var(--white);
            padding: 40px 20px;
            text-align: center;
        }
        .thanks-content {
            max-width: 600px;
        }
        .thanks-icon {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 56px;
            color: var(--white);
            box-shadow: 0 10px 30px rgba(212,175,55,0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .thanks-content h1 {
            font-size: 42px;
            margin-bottom: 16px;
            color: var(--gold-light);
        }
        .thanks-content > p {
            font-size: 18px;
            line-height: 1.7;
            margin-bottom: 30px;
            opacity: 0.95;
        }
        .thanks-hadith {
            background: rgba(0,0,0,0.2);
            padding: 24px;
            border-radius: 16px;
            border-left: 4px solid var(--gold);
            margin-bottom: 30px;
            text-align: left;
        }
        .thanks-hadith p {
            font-style: italic;
            margin-bottom: 8px;
        }
        .thanks-hadith span {
            color: var(--gold-light);
            font-size: 13px;
        }
        .thanks-actions {
            display: flex;
            gap: 14px;
            justify-content: center;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>

    <div class="thanks-page">
        <div class="thanks-content">
            <div class="thanks-icon">
                <i class="fas fa-check"></i>
            </div>
            <h1>🌙 JazakAllah khair</h1>
            <p>Hemos recibido tu solicitud con éxito. Un voluntario de la Mezquita Abdullah te contactará pronto in sha' Allah.</p>
            
            <div class="thanks-hadith">
                <p>"Allah ayuda al siervo mientras el siervo ayuda a su hermano"</p>
                <span>- Hadiz auténtico (Muslim)</span>
            </div>
            
            <div class="thanks-actions">
                <a href="index.html" class="btn btn-gold btn-large">
                    <i class="fas fa-home"></i>
                    <span>Volver al inicio</span>
                </a>
                <a href="https://wa.me/5359490936" target="_blank" class="btn btn-secondary btn-large">
                    <i class="fab fa-whatsapp"></i>
                    <span>Contactar directamente</span>
                </a>
            </div>
        </div>
    </div>

</body>
</html>
